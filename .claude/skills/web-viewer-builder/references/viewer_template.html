<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Georgia', 'Noto Serif KR', 'Batang', serif;
  background: #f0ede6;
  color: #2c2c2c;
  line-height: 1.8;
  font-size: 17px;
}

/* ===== Layout Shell ===== */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ===== Sidebar / TOC ===== */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: #2c2c2c;
  color: #e0ddd5;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
  z-index: 100;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid #444;
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #f5f2eb;
  line-height: 1.4;
}

.sidebar-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #888;
  margin-top: 12px;
}

.toc-list {
  list-style: none;
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.toc-item {
  padding: 10px 20px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.5;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}

.toc-item:hover {
  background: #3a3a3a;
}

.toc-item.active {
  background: #3a3a3a;
  border-left-color: #c9a96e;
  color: #f5f2eb;
}

.toc-chapter-num {
  color: #c9a96e;
  font-weight: 600;
  margin-right: 4px;
}

/* ===== Main Content Area ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ===== Top Bar ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 24px;
  background: #fafafa;
  border-bottom: 1px solid #e0dcd4;
  min-height: 50px;
}

.topbar-title {
  font-size: 14px;
  color: #888;
  font-style: italic;
}

.menu-btn {
  display: none;
  background: none;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 18px;
  cursor: pointer;
  color: #555;
}

.lang-toggle {
  background: #2c2c2c;
  color: #f5f2eb;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: background 0.2s;
}

.lang-toggle:hover {
  background: #444;
}

/* ===== Page Viewport ===== */
.page-viewport {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #fafafa;
}

.page-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 48px 64px 80px;
  transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
}

.page-container.slide-out-left {
  transform: translateX(-100%);
  opacity: 0;
}

.page-container.slide-out-right {
  transform: translateX(100%);
  opacity: 0;
}

.page-container.slide-in-left {
  transform: translateX(100%);
  opacity: 0;
}

.page-container.slide-in-right {
  transform: translateX(-100%);
  opacity: 0;
}

.page-container.active {
  transform: translateX(0);
  opacity: 1;
}

/* ===== Navigation Tap Zones ===== */
.nav-zone {
  position: absolute;
  top: 0;
  width: 20%;
  height: calc(100% - 56px);
  z-index: 10;
  cursor: pointer;
}

.nav-zone-prev {
  left: 0;
}

.nav-zone-next {
  right: 0;
}

.nav-zone:hover {
  background: rgba(0, 0, 0, 0.02);
}

/* ===== Bottom Navigation Bar ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: #fafafa;
  border-top: 1px solid #e0dcd4;
  min-height: 56px;
}

.nav-btn {
  background: #2c2c2c;
  color: #f5f2eb;
  border: none;
  border-radius: 6px;
  padding: 10px 24px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
  min-width: 100px;
}

.nav-btn:hover {
  background: #444;
}

.nav-btn:disabled {
  background: #ccc;
  color: #888;
  cursor: not-allowed;
}

.page-indicator {
  font-size: 13px;
  color: #888;
  font-variant-numeric: tabular-nums;
}

/* ===== Page Content Typography ===== */
.page {
  display: none;
}

.page-content h1 {
  font-size: 28px;
  margin-bottom: 24px;
  color: #1a1a1a;
  border-bottom: 2px solid #c9a96e;
  padding-bottom: 12px;
}

.page-content h2 {
  font-size: 22px;
  margin-top: 32px;
  margin-bottom: 16px;
  color: #2c2c2c;
}

.page-content h3 {
  font-size: 18px;
  margin-top: 24px;
  margin-bottom: 12px;
  color: #3a3a3a;
}

.page-content p {
  margin-bottom: 16px;
  text-align: justify;
  word-break: keep-all;
}

.page-content a {
  color: #6a5a3e;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.page-content ul, .page-content ol {
  margin-bottom: 16px;
  padding-left: 28px;
}

.page-content li {
  margin-bottom: 6px;
}

.page-content blockquote {
  border-left: 4px solid #c9a96e;
  padding: 12px 20px;
  margin: 20px 0;
  background: #f5f2eb;
  color: #555;
  font-style: italic;
}

.page-content pre {
  background: #2c2c2c;
  color: #e0ddd5;
  padding: 20px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 20px 0;
  font-size: 14px;
  line-height: 1.6;
}

.page-content code {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.9em;
}

.page-content p code,
.page-content li code {
  background: #eae6de;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
}

.page-content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 24px auto;
  border-radius: 6px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}

.page-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 15px;
}

.page-content th,
.page-content td {
  border: 1px solid #ddd;
  padding: 10px 14px;
  text-align: left;
}

.page-content th {
  background: #eae6de;
  font-weight: 600;
}

.page-content tr:nth-child(even) {
  background: #f9f7f3;
}

.page-content hr {
  border: none;
  border-top: 1px solid #ddd;
  margin: 32px 0;
}

/* ===== Sidebar Overlay (mobile) ===== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 90;
}

/* ===== Mobile Responsive ===== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    transform: translateX(-100%);
    width: 280px;
    min-width: 280px;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay.visible {
    display: block;
  }

  .menu-btn {
    display: block;
  }

  .page-container {
    padding: 24px 20px 60px;
  }

  .page-content h1 {
    font-size: 22px;
  }

  .page-content h2 {
    font-size: 18px;
  }

  .nav-btn {
    padding: 10px 16px;
    font-size: 13px;
    min-width: 80px;
  }

  .nav-zone {
    width: 15%;
  }

  body {
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  .page-container {
    padding: 16px 14px 48px;
  }

  .topbar {
    padding: 8px 14px;
  }

  .navbar {
    padding: 10px 14px;
  }

  .topbar-title {
    display: none;
  }
}
</style>
</head>
<body>

<!-- ===== Sidebar Overlay (mobile) ===== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app">
  <!-- ===== Sidebar / Table of Contents ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 id="sidebarTitle">{{TITLE}}</h1>
      <div class="sidebar-label" id="tocLabel">목차</div>
    </div>
    <ul class="toc-list" id="tocList">
      {{TOC_ITEMS}}
    </ul>
  </aside>

  <!-- ===== Main Content ===== -->
  <div class="main">
    <!-- Top Bar -->
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">&#9776;</button>
      <span class="topbar-title" id="topbarTitle">{{TITLE}}</span>
      <button class="lang-toggle" id="langToggle">English</button>
    </div>

    <!-- Page Viewport -->
    <div class="page-viewport" id="pageViewport">
      <div class="nav-zone nav-zone-prev" id="navZonePrev" title="Previous page"></div>
      <div class="nav-zone nav-zone-next" id="navZoneNext" title="Next page"></div>
      <div class="page-container active" id="pageContainer">
        <div class="page-content" id="pageContent"></div>
      </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="navbar">
      <button class="nav-btn" id="prevBtn">&#8592; Prev</button>
      <span class="page-indicator" id="pageIndicator">Page 1 of 1</span>
      <button class="nav-btn" id="nextBtn">Next &#8594;</button>
    </div>
  </div>
</div>

<!-- ===== All Pages (hidden data) ===== -->
<div id="pagesData" style="display:none;">
{{PAGES}}
</div>

<script>
(function () {
  'use strict';

  // ===== Configuration =====
  var TOTAL_PAGES = {
    ko: {{TOTAL_PAGES_KO}},
    en: {{TOTAL_PAGES_EN}}
  };

  // ===== State =====
  var state = {
    lang: localStorage.getItem('ebook-lang') || 'ko',
    currentPage: 1,
    animating: false
  };

  // ===== DOM References =====
  var dom = {
    sidebar: document.getElementById('sidebar'),
    sidebarOverlay: document.getElementById('sidebarOverlay'),
    menuBtn: document.getElementById('menuBtn'),
    langToggle: document.getElementById('langToggle'),
    pageContainer: document.getElementById('pageContainer'),
    pageContent: document.getElementById('pageContent'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    pageIndicator: document.getElementById('pageIndicator'),
    tocList: document.getElementById('tocList'),
    tocLabel: document.getElementById('tocLabel'),
    navZonePrev: document.getElementById('navZonePrev'),
    navZoneNext: document.getElementById('navZoneNext'),
    pagesData: document.getElementById('pagesData')
  };

  // ===== Page Data Extraction =====
  var pages = { ko: [], en: [] };

  function extractPages() {
    var allPageDivs = dom.pagesData.querySelectorAll('.page');
    for (var i = 0; i < allPageDivs.length; i++) {
      var el = allPageDivs[i];
      var lang = el.getAttribute('data-lang');
      var pageNum = parseInt(el.getAttribute('data-page'), 10);
      var chapter = parseInt(el.getAttribute('data-chapter'), 10);
      if (pages[lang]) {
        pages[lang].push({
          num: pageNum,
          chapter: chapter,
          html: el.innerHTML
        });
      }
    }
  }

  // ===== TOC Management =====
  function updateTocVisibility() {
    var items = dom.tocList.querySelectorAll('.toc-item');
    for (var i = 0; i < items.length; i++) {
      var itemLang = items[i].getAttribute('data-lang');
      items[i].style.display = (itemLang === state.lang) ? '' : 'none';
    }
    dom.tocLabel.textContent = (state.lang === 'ko') ? '목차' : 'Contents';
  }

  function updateTocActive() {
    var items = dom.tocList.querySelectorAll('.toc-item[data-lang="' + state.lang + '"]');
    var activeEntry = null;
    for (var i = 0; i < items.length; i++) {
      items[i].classList.remove('active');
      var target = parseInt(items[i].getAttribute('data-target-page'), 10);
      if (target <= state.currentPage) {
        activeEntry = items[i];
      }
    }
    if (activeEntry) {
      activeEntry.classList.add('active');
      // Scroll active item into view within sidebar
      activeEntry.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // ===== Rendering =====
  function getTotalPages() {
    return TOTAL_PAGES[state.lang] || 0;
  }

  function renderPage(direction) {
    if (state.animating) return;

    var total = getTotalPages();
    var pageData = pages[state.lang][state.currentPage - 1];

    if (!pageData) {
      dom.pageContent.innerHTML = '<p style="color:#888;text-align:center;margin-top:80px;">No content available.</p>';
      updateNavButtons();
      updatePageIndicator();
      updateTocActive();
      return;
    }

    if (direction === 'none') {
      // No animation — direct render
      dom.pageContent.innerHTML = pageData.html;
      dom.pageContainer.className = 'page-container active';
      updateNavButtons();
      updatePageIndicator();
      updateTocActive();
      scrollToTop();
      return;
    }

    // Animate page flip
    state.animating = true;

    var slideOutClass = (direction === 'next') ? 'slide-out-left' : 'slide-out-right';
    var slideInClass = (direction === 'next') ? 'slide-in-left' : 'slide-in-right';

    dom.pageContainer.className = 'page-container ' + slideOutClass;

    setTimeout(function () {
      dom.pageContent.innerHTML = pageData.html;
      dom.pageContainer.className = 'page-container ' + slideInClass;

      // Force reflow
      void dom.pageContainer.offsetWidth;

      dom.pageContainer.className = 'page-container active';

      setTimeout(function () {
        state.animating = false;
      }, 300);
    }, 300);

    updateNavButtons();
    updatePageIndicator();
    updateTocActive();
    scrollToTop();
  }

  function scrollToTop() {
    dom.pageContainer.scrollTop = 0;
  }

  function updateNavButtons() {
    var total = getTotalPages();
    dom.prevBtn.disabled = (state.currentPage <= 1);
    dom.nextBtn.disabled = (state.currentPage >= total);

    if (state.lang === 'ko') {
      dom.prevBtn.innerHTML = '&#8592; 이전';
      dom.nextBtn.innerHTML = '다음 &#8594;';
    } else {
      dom.prevBtn.innerHTML = '&#8592; Prev';
      dom.nextBtn.innerHTML = 'Next &#8594;';
    }
  }

  function updatePageIndicator() {
    var total = getTotalPages();
    if (state.lang === 'ko') {
      dom.pageIndicator.textContent = state.currentPage + ' / ' + total + ' 페이지';
    } else {
      dom.pageIndicator.textContent = 'Page ' + state.currentPage + ' of ' + total;
    }
  }

  // ===== Navigation =====
  function goToPage(pageNum, direction) {
    var total = getTotalPages();
    if (pageNum < 1 || pageNum > total || pageNum === state.currentPage) return;
    var dir = direction || (pageNum > state.currentPage ? 'next' : 'prev');
    state.currentPage = pageNum;
    renderPage(dir);
  }

  function nextPage() {
    goToPage(state.currentPage + 1, 'next');
  }

  function prevPage() {
    goToPage(state.currentPage - 1, 'prev');
  }

  // ===== Language Toggle =====
  function setLanguage(lang) {
    state.lang = lang;
    localStorage.setItem('ebook-lang', lang);

    dom.langToggle.textContent = (lang === 'ko') ? 'English' : '한국어';
    document.documentElement.lang = lang;

    // Attempt to maintain proportional page position
    var oldTotal = TOTAL_PAGES[lang === 'ko' ? 'en' : 'ko'] || 1;
    var newTotal = TOTAL_PAGES[lang] || 1;
    var ratio = state.currentPage / oldTotal;
    state.currentPage = Math.max(1, Math.min(newTotal, Math.round(ratio * newTotal)));

    updateTocVisibility();
    renderPage('none');
  }

  function toggleLanguage() {
    setLanguage(state.lang === 'ko' ? 'en' : 'ko');
  }

  // ===== Sidebar Toggle (mobile) =====
  function openSidebar() {
    dom.sidebar.classList.add('open');
    dom.sidebarOverlay.classList.add('visible');
  }

  function closeSidebar() {
    dom.sidebar.classList.remove('open');
    dom.sidebarOverlay.classList.remove('visible');
  }

  // ===== Touch / Swipe =====
  var touch = { startX: 0, startY: 0, startTime: 0 };

  function onTouchStart(e) {
    var t = e.touches[0];
    touch.startX = t.clientX;
    touch.startY = t.clientY;
    touch.startTime = Date.now();
  }

  function onTouchEnd(e) {
    var t = e.changedTouches[0];
    var dx = t.clientX - touch.startX;
    var dy = t.clientY - touch.startY;
    var dt = Date.now() - touch.startTime;

    // Must be a horizontal swipe: fast enough, long enough, mostly horizontal
    if (dt < 500 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) {
        nextPage();
      } else {
        prevPage();
      }
    }
  }

  // ===== Event Bindings =====
  function bindEvents() {
    // Navigation buttons
    dom.prevBtn.addEventListener('click', prevPage);
    dom.nextBtn.addEventListener('click', nextPage);

    // Navigation tap zones
    dom.navZonePrev.addEventListener('click', prevPage);
    dom.navZoneNext.addEventListener('click', nextPage);

    // Keyboard
    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        prevPage();
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        nextPage();
      }
    });

    // Touch swipe
    dom.pageContainer.addEventListener('touchstart', onTouchStart, { passive: true });
    dom.pageContainer.addEventListener('touchend', onTouchEnd, { passive: true });

    // Language toggle
    dom.langToggle.addEventListener('click', toggleLanguage);

    // Sidebar toggle (mobile)
    dom.menuBtn.addEventListener('click', function () {
      if (dom.sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });
    dom.sidebarOverlay.addEventListener('click', closeSidebar);

    // TOC item clicks
    dom.tocList.addEventListener('click', function (e) {
      var item = e.target.closest('.toc-item');
      if (!item) return;
      var targetPage = parseInt(item.getAttribute('data-target-page'), 10);
      if (targetPage) {
        goToPage(targetPage, 'none');
        closeSidebar();
      }
    });
  }

  // ===== Initialization =====
  function init() {
    extractPages();
    setLanguage(state.lang);
    bindEvents();
  }

  // Start when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>

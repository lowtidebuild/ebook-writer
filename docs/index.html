<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>변호사를 위한 Claude Code 완전 정복</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1e1e1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none}
  .bar{background:#111;color:#aaa;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;font-size:13px;flex-shrink:0;z-index:20}
  .bar .t{font-weight:600;color:#ddd;font-size:13px}.bar .c{display:flex;align-items:center;gap:8px}
  .bar button{background:#333;color:#ddd;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:12px}
  .bar button:hover{background:#444}.bar button.on{background:#3b6de0;color:#fff}
  .bar .pg{color:#888;min-width:80px;text-align:center;font-size:12px}
  .main{flex:1;display:flex;overflow:hidden}
  .sidebar{width:260px;background:#161616;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .25s ease;z-index:15}
  .sidebar.closed{margin-left:-260px}
  .sb-header{padding:12px 14px 8px;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #2a2a2a;flex-shrink:0}
  .sb-list{flex:1;overflow-y:auto;padding:6px 0}.sb-list::-webkit-scrollbar{width:4px}.sb-list::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .sb-item{display:block;width:100%;padding:8px 14px;border:none;background:none;color:#999;font-size:12px;text-align:left;cursor:pointer;transition:all .15s;line-height:1.4}
  .sb-item:hover{background:#222;color:#ddd}
  .sb-item.active{background:#1e2a4a;color:#7aabff;border-left:3px solid #3b6de0}
  .sb-item .ch-num{display:inline-block;min-width:28px;color:#555;font-size:11px;font-weight:600}
  .sb-item.active .ch-num{color:#5b8ddf}
  .sb-toggle{background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:2px 6px;margin-right:8px}.sb-toggle:hover{color:#ddd}
  .viewer{flex:1;display:flex;align-items:center;justify-content:center;position:relative;perspective:2000px}
  .book-wrap{position:relative;transform-style:preserve-3d}
  .book{display:flex;position:relative;box-shadow:0 8px 50px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);border-radius:0 3px 3px 0}
  .book::before{content:'';position:absolute;top:0;left:-3px;width:6px;height:100%;background:linear-gradient(to right,#0a0a0a,#2a2a2a 40%,#1a1a1a);border-radius:3px 0 0 3px;z-index:6}
  .book::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:12px;height:100%;background:linear-gradient(to right,transparent 0%,rgba(0,0,0,.06) 20%,rgba(0,0,0,.12) 45%,rgba(0,0,0,.12) 55%,rgba(0,0,0,.06) 80%,transparent 100%);z-index:5;pointer-events:none}
  .pg-box{position:relative;overflow:hidden;background:#fff}.pg-box canvas{display:block}
  .pg-l::after{content:'';position:absolute;top:0;right:0;width:25px;height:100%;background:linear-gradient(to left,rgba(0,0,0,.07),transparent);pointer-events:none}
  .pg-r::before{content:'';position:absolute;top:0;left:0;width:25px;height:100%;background:linear-gradient(to right,rgba(0,0,0,.07),transparent);pointer-events:none;z-index:2}
  .pg-r{border-right:1px solid rgba(0,0,0,.08)}
  .arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08);width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
  .arr:hover{background:rgba(255,255,255,.15);color:#fff}.arr-l{left:12px}.arr-r{right:12px}
  .turning-fwd .pg-r{animation:turnFwd .45s cubic-bezier(.4,0,.2,1);transform-origin:left center}
  .turning-bwd .pg-l{animation:turnBwd .45s cubic-bezier(.4,0,.2,1);transform-origin:right center}
  @keyframes turnFwd{0%{transform:rotateY(0)}30%{transform:rotateY(-25deg);box-shadow:-8px 0 20px rgba(0,0,0,.2)}100%{transform:rotateY(0)}}
  @keyframes turnBwd{0%{transform:rotateY(0)}30%{transform:rotateY(25deg);box-shadow:8px 0 20px rgba(0,0,0,.2)}100%{transform:rotateY(0)}}
  .ld{position:fixed;inset:0;background:#1e1e1e;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;z-index:100;font-size:14px;gap:12px}
  .ld.off{display:none}
  .sp{width:32px;height:32px;border:3px solid #333;border-top-color:#3b6de0;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:900px){.sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30}.sidebar.closed{margin-left:-260px}.book::before,.book::after{display:none}.pg-l::after,.pg-r::before{display:none}.pg-r{border-right:none}}
</style>
</head>
<body>
<div class="ld" id="ld"><div class="sp"></div><div>Loading...</div></div>
<div class="bar">
  <div style="display:flex;align-items:center">
    <button class="sb-toggle" onclick="toggleSidebar()">&#9776;</button>
    <span class="t" id="tt">변호사를 위한 Claude Code 완전 정복</span>
  </div>
  <div class="c">
    <button id="bk" class="on" onclick="sw('primary')">한국어</button>
    <button id="be" onclick="sw('secondary')">English</button>
    <span style="color:#333">|</span>
    <button onclick="zo(-1)">-</button>
    <span class="pg" id="pi">1 / 1</span>
    <button onclick="zo(1)">+</button>
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sb"><div class="sb-header" id="sbh">Contents</div><div class="sb-list" id="sbl"></div></div>
  <div class="viewer" id="vw">
    <button class="arr arr-l" id="al" onclick="go(-1)">&#8249;</button>
    <div class="book-wrap"><div class="book" id="bk_el"><div class="pg-box pg-l" id="pl"><canvas id="cl"></canvas></div><div class="pg-box pg-r" id="pr"><canvas id="cr"></canvas></div></div></div>
    <button class="arr arr-r" id="ar" onclick="go(1)">&#8250;</button>
  </div>
</div>
<script type="module">
const CDN='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155';
const{getDocument,GlobalWorkerOptions}=await import(`${CDN}/pdf.min.mjs`);
GlobalWorkerOptions.workerSrc=`${CDN}/pdf.worker.min.mjs`;
let pdf,sp=0,np=0,zm=1,busy=0,mob=innerWidth<=900,lang='primary';
const F={primary:'book_ko.pdf',secondary:'book_en.pdf'};
const T={primary:'변호사를 위한 Claude Code 완전 정복',secondary:'Mastering Claude Code for Lawyers'};
const TL={primary:'목차',secondary:'Contents'};
const $=id=>document.getElementById(id);
let toc=[];
async function buildToc(){
  toc=[];
  // Strategy: chapter opening pages have the chapter number/title as the
  // first significant text on the page, positioned in the upper portion.
  // We look for items in the top 40% of the page that match "제N장" or "Chapter N".
  for(let p=1;p<=np;p++){
    try{
      const pg=await pdf.getPage(p);
      const vp=pg.getViewport({scale:1});
      const pageH=vp.height;
      const tc=await pg.getTextContent();
      // Only look at text items in the top 40% of the page
      const topItems=tc.items.filter(it=>it.transform&&it.transform[5]>pageH*0.6);
      if(!topItems.length)continue;
      // Build text from top items only
      const topText=topItems.map(it=>it.str).join(' ').replace(/\s+/g,' ').trim();
      // Match chapter heading patterns
      let m=topText.match(/제(\d+)장[:\s.\-—]+(.{2,50})/);
      if(!m) m=topText.match(/Chapter\s+(\d+)[:\s.\-—]+(.{2,50})/i);
      if(!m){
        // Some pages just have "Chapter N" as a standalone heading
        m=topText.match(/^Chapter\s+(\d+)$/i);
        if(m) m=[m[0],m[1],''];
      }
      if(!m){
        m=topText.match(/^제(\d+)장$/);
        if(m) m=[m[0],m[1],''];
      }
      if(m){
        const cn=parseInt(m[1]);
        // Skip if this is in the TOC pages (first ~12 pages)
        if(p<=12)continue;
        // Skip if we already have this chapter
        if(toc.some(e=>e.c===cn))continue;
        let title=m[0].trim();
        if(title.length>55)title=title.slice(0,53)+'...';
        toc.push({c:cn,t:title,p:p});
      }
    }catch(e){}
  }
  toc.sort((a,b)=>a.c-b.c);
  console.log('TOC:',toc.map(e=>'Ch'+e.c+'=p'+e.p).join(', '));
}
function buildSB(){const l=$('sbl');l.innerHTML='';$('sbh').textContent=TL[lang];if(!toc.length){l.innerHTML='<div style="padding:14px;color:#666;font-size:12px">Scanning...</div>';return;}for(const e of toc){const b=document.createElement('button');b.className='sb-item';b.dataset.page=e.p;b.innerHTML=`<span class="ch-num">${e.c}.</span> ${e.t}`;b.onclick=()=>jmp(e.p);l.appendChild(b);}upd();}
function upd(){const cur=mob?sp+1:sp*2+2;let act=null;document.querySelectorAll('.sb-item').forEach(i=>{i.classList.remove('active');if(parseInt(i.dataset.page)<=cur)act=i;});if(act){act.classList.add('active');act.scrollIntoView({block:'nearest',behavior:'smooth'});}}
function jmp(p){if(!p||p<1)return;sp=mob?p-1:Math.floor((p-1)/2);anim('turning-fwd');dr();if(mob)toggleSidebar();}
window.toggleSidebar=()=>{$('sb').classList.toggle('closed');};
async function init(l){$('ld').classList.remove('off');try{pdf=await getDocument(F[l]).promise;np=pdf.numPages;sp=0;await buildToc();buildSB();await dr();}catch(e){$('ld').innerHTML=`<div style="color:#e55">${e.message}</div>`;}$('ld').classList.add('off');}
async function rp(n,cv){if(n<1||n>np){cv.width=cv.height=0;cv.parentElement.style.display='none';return;}cv.parentElement.style.display='';const pg=await pdf.getPage(n),bv=pg.getViewport({scale:1});const h=$('vw').clientHeight-28,s=(h/bv.height)*zm;const vp=pg.getViewport({scale:s});cv.width=vp.width;cv.height=vp.height;await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;}
async function dr(){if(busy)return;busy=1;if(mob){$('pr').style.display='none';await rp(sp+1,$('cl'));ui(sp+1,sp+1);}else{const l=sp*2+1,r=sp*2+2;$('pr').style.display='';await Promise.all([rp(l,$('cl')),rp(r,$('cr'))]);ui(l,Math.min(r,np));}upd();busy=0;}
function ui(a,b){$('pi').textContent=a===b?`${a} / ${np}`:`${a}-${b} / ${np}`;$('al').style.visibility=sp===0?'hidden':'';$('ar').style.visibility=sp>=(mob?np-1:Math.floor((np-1)/2))?'hidden':'';}
window.go=d=>{const mx=mob?np-1:Math.floor((np-1)/2);if(d>0&&sp<mx){sp++;anim('turning-fwd');dr();}if(d<0&&sp>0){sp--;anim('turning-bwd');dr();}};
function anim(c){const b=$('bk_el');b.classList.remove('turning-fwd','turning-bwd');void b.offsetWidth;b.classList.add(c);setTimeout(()=>b.classList.remove(c),450);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();go(1);}if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(-1);}});
let tx=0;document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50)go(d<0?1:-1);});
$('vw').addEventListener('click',e=>{if(e.target.closest('.arr'))return;const r=$('vw').getBoundingClientRect(),x=e.clientX-r.left;if(x<r.width*.15)go(-1);else if(x>r.width*.85)go(1);});
window.zo=d=>{zm=Math.max(.5,Math.min(2.5,zm+d*.15));dr();};
window.sw=l=>{lang=l;$('bk').classList.toggle('on',l==='primary');$('be').classList.toggle('on',l==='secondary');$('tt').textContent=T[l];init(l);};
addEventListener('resize',()=>{mob=innerWidth<=900;dr();});
init('primary');
</script>
</body>
</html>
